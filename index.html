<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #eee; max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    h1 { font-size: 1.5rem; }
    .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; background: #3b82f6; color: white; transition: background 0.15s; }
    .btn:hover { background: #2563eb; }
    .btn-secondary { background: #374151; }
    .btn-secondary:hover { background: #4b5563; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: #dc2626; padding: 6px 12px; font-size: 0.85rem; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-shuffle { background: #8b5cf6; }
    .btn-shuffle:hover { background: #7c3aed; }

    .view { display: none; }
    .view.active { display: block; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.15s; border: 1px solid #262626; position: relative; }
    .card:hover { transform: translateY(-3px); border-color: #3b82f6; }
    .card img { width: 100%; height: 180px; object-fit: cover; display: block; background: #222; }
    .card .info { padding: 14px; }
    .card h3 { font-size: 1rem; margin-bottom: 4px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .meta { font-size: 0.85rem; color: #888; }
    .card .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(220, 38, 38, 0.7); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 1.2rem; line-height: 1; display: flex; align-items: center; justify-content: center; z-index: 10; opacity: 0.7; transition: opacity 0.15s; }
    .card .delete-btn:hover { opacity: 1; background: rgba(220, 38, 38, 0.9); }

    .pagination { display: flex; gap: 12px; justify-content: center; margin-top: 35px; align-items: center; }
    .pagination button { padding: 8px 16px; background: #1a1a1a; border: 1px solid #333; color: #eee; border-radius: 6px; cursor: pointer; }
    .pagination button:disabled { opacity: 0.3; cursor: default; }

    .img-column { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .img-column .img-wrap { width: 100%; max-width: 600px; position: relative; }
    .img-column img { width: 100%; height: auto; border-radius: 8px; display: block; cursor: pointer; background: #1a1a1a; }
    .img-column img:hover { opacity: 0.9; }
    .img-column .img-meta { color: #666; font-size: 0.8rem; margin-top: 4px; text-align: center; }

    .loading { text-align: center; padding: 30px; color: #666; }
    .empty { text-align: center; padding: 60px 20px; color: #666; }
    .empty p { margin-top: 10px; font-size: 0.95rem; }

    #uploadModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; justify-content: center; align-items: center; padding: 20px; }
    #uploadModal.active { display: flex; }
    .modal-box { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-box h2 { margin-bottom: 16px; font-size: 1.2rem; }
    .modal-box p { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
    .modal-box input[type="text"] { width: 100%; padding: 10px; background: #0f0f0f; border: 1px solid #333; color: #eee; border-radius: 6px; margin-bottom: 14px; font-size: 1rem; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 14px; }
    .preview-grid img { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; background: #222; }
    .preview-grid .more { display: flex; align-items: center; justify-content: center; background: #222; border-radius: 4px; color: #888; font-size: 0.8rem; }
    .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 12px; }
    .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.2s; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

    .folder-list { margin: 12px 0; max-height: 200px; overflow-y: auto; }
    .folder-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #0f0f0f; border-radius: 6px; margin-bottom: 6px; }
    .folder-item .folder-name { flex: 1; font-weight: 500; }
    .folder-item .folder-count { color: #888; font-size: 0.85rem; }
    .folder-item .folder-status { font-size: 0.8rem; }
    .folder-item .folder-status.done { color: #22c55e; }
    .folder-item .folder-status.uploading { color: #3b82f6; }
    .folder-item .folder-status.pending { color: #888; }

    #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
    #lightbox.active { display: flex; }
    #lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
    #lightbox .close-btn { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: #fff; cursor: pointer; background: none; border: none; line-height: 1; }
    #lightbox .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2rem; color: #fff; cursor: pointer; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
    #lightbox .nav-btn:hover { background: rgba(0,0,0,0.8); }
    #lightbox .nav-btn.prev { left: 20px; }
    #lightbox .nav-btn.next { right: 20px; }
    #lightbox .counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #888; font-size: 0.9rem; }

    .error-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #dc2626; color: white; padding: 12px 24px; border-radius: 8px; z-index: 200; display: none; max-width: 90%; word-break: break-word; }
    .error-toast.active { display: block; }

    #passwordGate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .pw-box { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; text-align: center; }
    .pw-box h2 { margin-bottom: 10px; font-size: 1.5rem; }
    .pw-box p { color: #888; margin-bottom: 24px; font-size: 0.95rem; }
    .pw-box input[type="password"] { width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #333; color: #eee; border-radius: 6px; margin-bottom: 16px; font-size: 1rem; text-align: center; }
    .pw-box .pw-error { color: #dc2626; font-size: 0.9rem; margin-bottom: 12px; min-height: 20px; }

    .sort-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .sort-bar span { color: #888; font-size: 0.9rem; }
    .sort-bar button { padding: 6px 14px; background: #1a1a1a; border: 1px solid #333; color: #eee; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .sort-bar button.active { background: #3b82f6; border-color: #3b82f6; }
  </style>
</head>
<body>

  <div id="passwordGate">
    <div class="pw-box">
      <h2>🔒 Gallery</h2>
      <p>Enter the password to access this gallery.</p>
      <div class="pw-error" id="pwError"></div>
      <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
      <button class="btn" onclick="checkPassword()" style="width:100%;">Enter</button>
    </div>
  </div>

  <div id="mainApp" style="display:none;">
    <div class="header">
      <h1>Image Sets</h1>
      <div>
        <button class="btn" onclick="openUpload()">+ Upload Folder(s)</button>
      </div>
    </div>

    <div id="setsView" class="view active">
      <div class="grid" id="setsGrid"></div>
      <div class="pagination" id="setsPagination" style="display:none;"></div>
      <div class="empty" id="setsEmpty" style="display:none;">
        <h3>No sets yet</h3>
        <p>Click "Upload Folder(s)" to add image sets.</p>
      </div>
    </div>

    <div id="detailView" class="view">
      <button class="btn btn-secondary" onclick="showSets()" style="margin-bottom:16px;">← Back to Sets</button>
      <h2 id="detailTitle" style="margin-bottom:8px;"></h2>
      <div class="sort-bar">
        <span>Sort by:</span>
        <button id="sortNewest" class="active" onclick="setSort('newest')">Newest</button>
        <button id="sortLargest" onclick="setSort('largest')">Largest</button>
        <button id="sortRandom" class="btn-shuffle" onclick="setSort('random')">🔀 Random</button>
      </div>
      <div class="img-column" id="imagesColumn"></div>
      <div class="loading" id="imagesLoading">Loading...</div>
    </div>

    <div id="uploadModal">
      <div class="modal-box">
        <h2>Create New Set(s)</h2>
        <p>Select one or more folders. Each folder becomes its own set.</p>
        <input type="text" id="setTitle" placeholder="Set title (optional, uses folder name if blank)...">
        <div class="preview-grid" id="previewGrid"></div>
        <div id="uploadMeta" style="color:#888; font-size:0.9rem;"></div>
        <div class="folder-list" id="folderList"></div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="uploadStatus" style="color:#888; font-size:0.85rem; margin-top:8px;"></div>
        <div class="modal-actions">
          <button class="btn" id="uploadBtn" onclick="startUpload()">Create Set(s)</button>
          <button class="btn btn-secondary" onclick="closeUpload()">Cancel</button>
        </div>
      </div>
    </div>

    <div id="lightbox" onclick="closeLightbox(event)">
      <button class="close-btn" onclick="closeLightbox(event)">&times;</button>
      <button class="nav-btn prev" onclick="navLightbox(-1, event)">‹</button>
      <button class="nav-btn next" onclick="navLightbox(1, event)">›</button>
      <img id="lightboxImg" src="" alt="">
      <div class="counter" id="lightboxCounter"></div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://oxeghayulnnihulytgio.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LweqYhmjd-YcWoR6ZrKxug_QB2ML0Yp';
    const GALLERY_PASSWORD = 'Gallery69';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const BUCKET = 'gallery';

    function checkPassword() {
      const input = document.getElementById('pwInput').value;
      if (input === GALLERY_PASSWORD) {
        document.getElementById('passwordGate').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        initApp();
      } else {
        document.getElementById('pwError').textContent = 'Wrong password. Try again.';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    }

    let setsPage = 1;
    const SETS_PER_PAGE = 12;
    let currentSetId = null;
    let imagesPage = 1;
    const IMAGES_PER_PAGE = 10;
    let imagesHasMore = true;
    let imagesLoading = false;
    let currentSort = 'newest';
    let pendingFiles = [];
    let objectUrls = [];
    let allImagesInSet = [];
    let lightboxIndex = 0;
    let folderGroups = [];

    function showError(msg) {
      const toast = document.getElementById('errorToast');
      toast.textContent = msg;
      toast.classList.add('active');
      setTimeout(() => toast.classList.remove('active'), 8000);
    }

    function showSets() {
      objectUrls.forEach(u => URL.revokeObjectURL(u));
      objectUrls = [];
      document.getElementById('setsView').classList.add('active');
      document.getElementById('detailView').classList.remove('active');
      currentSetId = null;
      allImagesInSet = [];
      renderSets();
    }

    function showDetail(setId, title) {
      objectUrls.forEach(u => URL.revokeObjectURL(u));
      objectUrls = [];
      currentSetId = setId;
      imagesPage = 1;
      imagesHasMore = true;
      imagesLoading = false;
      currentSort = 'newest';
      allImagesInSet = [];
      document.getElementById('sortNewest').classList.add('active');
      document.getElementById('sortLargest').classList.remove('active');
      document.getElementById('sortRandom').classList.remove('active');
      document.getElementById('setsView').classList.remove('active');
      document.getElementById('detailView').classList.add('active');
      document.getElementById('imagesColumn').innerHTML = '';
      document.getElementById('imagesLoading').style.display = 'block';
      document.getElementById('detailTitle').textContent = title || 'Untitled';
      loadMoreImages();
    }

    function setSort(mode) {
      if (mode === currentSort && mode !== 'random') return;
      currentSort = mode;
      document.getElementById('sortNewest').classList.toggle('active', mode === 'newest');
      document.getElementById('sortLargest').classList.toggle('active', mode === 'largest');
      document.getElementById('sortRandom').classList.toggle('active', mode === 'random');
      imagesPage = 1;
      imagesHasMore = true;
      imagesLoading = false;
      allImagesInSet = [];
      document.getElementById('imagesColumn').innerHTML = '';
      document.getElementById('imagesLoading').style.display = 'block';
      loadMoreImages();
    }

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function deleteSet(e, setId) {
      e.stopPropagation();
      if (!confirm('Delete this set and all its images?')) return;
      try {
        const { data: imgs, error: imgErr } = await supabaseClient.from('images').select('path').eq('set_id', setId);
        if (imgErr) throw imgErr;
        if (imgs && imgs.length > 0) {
          const paths = imgs.map(i => i.path);
          await supabaseClient.storage.from(BUCKET).remove(paths);
        }
        await supabaseClient.from('images').delete().eq('set_id', setId);
        await supabaseClient.from('image_sets').delete().eq('id', setId);
        if (currentSetId === setId) showSets(); else renderSets();
      } catch (err) {
        showError('Delete failed: ' + err.message);
      }
    }

    async function renderSets() {
      try {
        const from = (setsPage - 1) * SETS_PER_PAGE;
        const to = from + SETS_PER_PAGE - 1;
        const { data: sets, error, count } = await supabaseClient
          .from('image_sets').select('*', { count: 'exact' })
          .order('created_at', { ascending: false }).range(from, to);
        if (error) throw error;
        const total = count || 0;
        const totalPages = Math.max(1, Math.ceil(total / SETS_PER_PAGE));
        if (setsPage > totalPages) setsPage = totalPages;
        if (setsPage < 1) setsPage = 1;
        const grid = document.getElementById('setsGrid');
        const empty = document.getElementById('setsEmpty');
        const pag = document.getElementById('setsPagination');
        if (total === 0) { grid.innerHTML = ''; empty.style.display = 'block'; pag.style.display = 'none'; return; }
        empty.style.display = 'none'; pag.style.display = 'flex'; grid.innerHTML = '';
        for (const set of sets) {
          const div = document.createElement('div');
          div.className = 'card';
          div.onclick = () => showDetail(set.id, set.title);
          const coverUrl = supabaseClient.storage.from(BUCKET).getPublicUrl(set.cover_path).data.publicUrl;
          div.innerHTML = `<button class="delete-btn" onclick="deleteSet(event, ${set.id})" title="Delete set">×</button>
            <img src="${coverUrl}" alt="${set.title || ''}" loading="lazy" onerror="this.style.display='none'">
            <div class="info"><h3>${set.title || 'Untitled'}</h3><div class="meta">${new Date(set.created_at).toLocaleDateString()}</div></div>`;
          grid.appendChild(div);
        }
        pag.innerHTML = `<button ${setsPage === 1 ? 'disabled' : ''} onclick="changeSetsPage(-1)">Previous</button>
          <span style="color:#888; font-size:0.9rem;">Page ${setsPage} of ${totalPages}</span>
          <button ${setsPage >= totalPages ? 'disabled' : ''} onclick="changeSetsPage(1)">Next</button>`;
      } catch (err) { showError('Failed to load sets: ' + err.message); console.error(err); }
    }

    function changeSetsPage(delta) { setsPage += delta; renderSets(); }

    async function loadMoreImages() {
      if (imagesLoading || !imagesHasMore || !currentSetId) return;
      imagesLoading = true;
      try {
        const from = (imagesPage - 1) * IMAGES_PER_PAGE;
        const to = from + IMAGES_PER_PAGE - 1;

        let query = supabaseClient.from('images').select('*', { count: 'exact' }).eq('set_id', currentSetId);
        if (currentSort === 'newest') {
          query = query.order('created_at', { ascending: false });
        } else if (currentSort === 'largest') {
          query = query.order('file_size', { ascending: false });
        }
        const { data: imgs, error, count } = await query.range(from, to);

        if (error) throw error;

        let displayImgs = imgs;
        if (currentSort === 'random') {
          const { data: allImgs } = await supabaseClient
            .from('images')
            .select('*')
            .eq('set_id', currentSetId);
          if (allImgs) {
            displayImgs = shuffleArray(allImgs).slice(from, to + 1);
            imagesHasMore = false;
          }
        }

        const col = document.getElementById('imagesColumn');
        for (const img of displayImgs) {
          if (!allImagesInSet.find(x => x.id === img.id)) allImagesInSet.push(img);
          const wrap = document.createElement('div');
          wrap.className = 'img-wrap';
          const el = document.createElement('img');
          const url = supabaseClient.storage.from(BUCKET).getPublicUrl(img.path).data.publicUrl;
          el.src = url; el.alt = img.filename || ''; el.loading = 'lazy';
          el.onclick = (e) => { e.stopPropagation(); openLightbox(allImagesInSet.findIndex(x => x.id === img.id)); };
          wrap.appendChild(el);
          const meta = document.createElement('div');
          meta.className = 'img-meta';
          meta.textContent = img.file_size ? formatSize(img.file_size) : '';
          wrap.appendChild(meta);
          col.appendChild(wrap);
        }

        const total = count || 0;
        if (currentSort !== 'random') {
          imagesHasMore = (from + displayImgs.length) < total;
        }
        imagesPage++;
        if (!imagesHasMore) document.getElementById('imagesLoading').style.display = 'none';
      } catch (err) { showError('Failed to load images: ' + err.message); console.error(err); }
      imagesLoading = false;
    }

    const scrollObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) loadMoreImages();
    }, { rootMargin: '400px' });

    function openUpload() { document.getElementById('folderInput').click(); }

    document.getElementById('folderInput').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files).filter(f => f.type && f.type.startsWith('image/'));
      if (!files.length) { showError('No images found'); return; }

      const groups = {};
      files.forEach(f => {
        const path = f.webkitRelativePath || f.name;
        const folder = path.includes('/') ? path.split('/')[0] : 'Untitled';
        if (!groups[folder]) groups[folder] = [];
        groups[folder].push(f);
      });

      folderGroups = Object.entries(groups).map(([name, files]) => ({ name, files }));
      pendingFiles = files;

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '';
      folderGroups.forEach((group, i) => {
        const item = document.createElement('div');
        item.className = 'folder-item';
        item.id = 'folder-item-' + i;
        item.innerHTML = `<span class="folder-name">📁 ${group.name}</span><span class="folder-count">${group.files.length} images</span><span class="folder-status pending">Pending</span>`;
        folderList.appendChild(item);
      });

      const grid = document.getElementById('previewGrid');
      grid.innerHTML = '';
      const previews = folderGroups[0].files.slice(0, 24);
      for (const f of previews) {
        const url = URL.createObjectURL(f); objectUrls.push(url);
        const img = document.createElement('img'); img.src = url; grid.appendChild(img);
      }
      if (folderGroups[0].files.length > 24) {
        const more = document.createElement('div'); more.className = 'more';
        more.textContent = '+' + (folderGroups[0].files.length - 24) + ' more'; grid.appendChild(more);
      }

      document.getElementById('uploadMeta').textContent = `${folderGroups.length} folder(s), ${files.length} total images`;
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('uploadStatus').textContent = '';
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadBtn').textContent = `Create ${folderGroups.length} Set(s)`;
      document.getElementById('uploadModal').classList.add('active');
    });

    function updateFolderStatus(index, status) {
      const item = document.getElementById('folder-item-' + index);
      if (!item) return;
      const badge = item.querySelector('.folder-status');
      badge.className = 'folder-status ' + status;
      if (status === 'uploading') badge.textContent = 'Uploading...';
      else if (status === 'done') badge.textContent = 'Done ✓';
      else if (status === 'fail') badge.textContent = 'Failed ✗';
      else badge.textContent = 'Pending';
    }

    function closeUpload() {
      document.getElementById('uploadModal').classList.remove('active');
      document.getElementById('folderInput').value = '';
      objectUrls.forEach(u => URL.revokeObjectURL(u)); objectUrls = []; pendingFiles = [];
      folderGroups = [];
    }

    function makeId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

    async function startUpload() {
      const btn = document.getElementById('uploadBtn');
      const fill = document.getElementById('progressFill');
      const status = document.getElementById('uploadStatus');
      btn.disabled = true; btn.textContent = 'Uploading...';

      let totalFiles = pendingFiles.length;
      let globalDone = 0;
      let globalOk = 0;
      let globalFail = 0;

      for (let g = 0; g < folderGroups.length; g++) {
        const group = folderGroups[g];
        updateFolderStatus(g, 'uploading');
        status.textContent = `Uploading folder ${g + 1}/${folderGroups.length}: ${group.name}...`;

        try {
          const customTitle = document.getElementById('setTitle').value.trim();
          const title = customTitle || group.name;
          const setId = makeId();

          const coverFile = group.files[0];
          const coverPath = `sets/${setId}/cover_${makeId()}_${coverFile.name}`;
          const { error: coverErr } = await supabaseClient.storage.from(BUCKET).upload(coverPath, coverFile);
          if (coverErr) throw new Error('Cover failed: ' + coverErr.message);

          const { data: setData, error: setErr } = await supabaseClient
            .from('image_sets').insert({ title, cover_path: coverPath }).select().single();
          if (setErr) throw new Error('Set creation failed: ' + setErr.message);

          const realSetId = setData.id;

          const BATCH_SIZE = 50;
          for (let batchStart = 0; batchStart < group.files.length; batchStart += BATCH_SIZE) {
            const batch = group.files.slice(batchStart, batchStart + BATCH_SIZE);
            const batchPromises = batch.map(async (f) => {
              const path = `sets/${setId}/img_${makeId()}_${f.name}`;
              try {
                const { error: upErr } = await supabaseClient.storage.from(BUCKET).upload(path, f);
                if (upErr) throw upErr;
                const { error: dbErr } = await supabaseClient.from('images').insert({
                  set_id: realSetId, path: path, filename: f.name, file_size: f.size
                });
                if (dbErr) throw dbErr;
                return { success: true };
              } catch (err) { return { success: false }; }
            });

            const results = await Promise.all(batchPromises);
            globalDone += batch.length;
            globalOk += results.filter(r => r.success).length;
            globalFail += results.filter(r => !r.success).length;
            fill.style.width = (globalDone / totalFiles * 100) + '%';
            status.textContent = `Folder ${g + 1}/${folderGroups.length}: ${globalDone}/${totalFiles} done (${globalOk} OK, ${globalFail} fail)`;
          }

          updateFolderStatus(g, 'done');
        } catch (err) {
          updateFolderStatus(g, 'fail');
          showError(`Folder "${group.name}" failed: ${err.message}`);
          console.error(err);
        }
      }

      if (globalFail > 0) showError(`${globalFail} image(s) failed across all folders`);
      closeUpload(); setsPage = 1; showSets();
